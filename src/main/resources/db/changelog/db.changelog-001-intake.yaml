databaseChangeLog:
  - changeSet:
      id: 001-create-staging-inbox
      author: openai
      changes:
        - createTable:
            tableName: staging_inbox
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_staging_inbox
                    nullable: false
              - column:
                  name: kafka_topic
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: kafka_partition
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: kafka_offset
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: kafka_key
                  type: TEXT
              - column:
                  name: loading_id
                  type: TEXT
              - column:
                  name: entity_type
                  type: TEXT
              - column:
                  name: raw_message
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: parse_status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: intake_status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: received_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: staged_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: staging_inbox
            columnNames: kafka_topic, kafka_partition, kafka_offset
            constraintName: uq_staging_inbox_kafka_position
        - createIndex:
            tableName: staging_inbox
            indexName: idx_staging_inbox_loading_id
            columns:
              - column:
                  name: loading_id
        - createIndex:
            tableName: staging_inbox
            indexName: idx_staging_inbox_entity_type
            columns:
              - column:
                  name: entity_type
        - createIndex:
            tableName: staging_inbox
            indexName: idx_staging_inbox_intake_status
            columns:
              - column:
                  name: intake_status

  - changeSet:
      id: 002-create-event-processing-log
      author: openai
      changes:
        - createTable:
            tableName: event_processing_log
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_event_processing_log
                    nullable: false
              - column:
                  name: staging_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: loading_id
                  type: TEXT
              - column:
                  name: entity_type
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: records_received
                  type: INT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: records_inserted
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: records_updated
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: records_skipped
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: event_processing_log
            columnNames: staging_id
            constraintName: uq_event_processing_log_staging
        - addForeignKeyConstraint:
            baseTableName: event_processing_log
            baseColumnNames: staging_id
            referencedTableName: staging_inbox
            referencedColumnNames: id
            constraintName: fk_event_processing_log_staging
            onDelete: RESTRICT
        - createIndex:
            tableName: event_processing_log
            indexName: idx_event_processing_log_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: event_processing_log
            indexName: idx_event_processing_log_loading_id
            columns:
              - column:
                  name: loading_id
        - createIndex:
            tableName: event_processing_log
            indexName: idx_event_processing_log_entity_type
            columns:
              - column:
                  name: entity_type
